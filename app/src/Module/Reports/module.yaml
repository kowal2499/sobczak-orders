app_module:
  namespace: reports
  description: Moduł raportów
  active: true
  grants:
    - name: Raporty na pulpicie
      description: Raporty i informacje na pulpicie systemu
      slug: reports.dashboard
      type: select
      options:
          - label: Ukończone zadania produkcyjne
            optionSlug: completedTasks
          - label: Zapełnienie listy produkcyjnej
            optionSlug: capacity-utilization
          - label: Obłożenie tygodniowe
            optionSlug: weekly-capacity
    - name: Kalendarz ogólny
      description: Dostęp do kalendarza ogólnego
      slug: reports.calendar_general
      type: boolean
    - name: Kalendarz zadań
      description: Dostęp do kalendarza zadań
      slug: reports.calendar_tasks
      type: boolean
    - name: Kalendarz zamówień
      description: Dostęp do kalendarza zamówień
      slug: reports.calendar_orders
      type: boolean
