# separate terms of service, privacy policy, and support
# documentation.

name: Symfony CI/CD

on:
  push:
    branches: [ "test", "master" ]
  pull_request:
    branches: [ "test", "master" ]

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://user:pass@127.0.0.1:3306/sobczak_app_test
      APP_ENV: test
      APP_SECRET: test_secret_for_ci

    services:
      db:
        image: mysql:5.7
        ports: 
          - 3306:3306
        env:
          MYSQL_DATABASE: sobczak_app_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: user
          MYSQL_PASSWORD: pass
        options: >-
          --health-cmd="mysqladmin ping -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@2cb9b829437ee246e9b3cac53555a39208ca6d28
        with:
          php-version: '8.1'
          extensions: mbstring, intl, pdo, pdo_mysql
          tools: composer

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: app/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('app/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-
            
      - name: Install PHP Dependencies
        working-directory: ./app
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Execute Database migrations
        working-directory: ./app
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Execute tests (Unit and Feature tests) via PHPUnit
        working-directory: ./app
        run: vendor/bin/phpunit ./tests/End2End ./tests/Unit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14'
          cache: 'npm'
          cache-dependency-path: app/assets/package-lock.json

      - name: Install NPM dependencies
        working-directory: ./app/assets
        run: npm ci

      - name: Build JS and CSS
        working-directory: ./app/assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: app/public/build/
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@2cb9b829437ee246e9b3cac53555a39208ca6d28
        with:
          php-version: '8.1'
          tools: deployer

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: app/public/build/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H s7.zenbox.pl >> ~/.ssh/known_hosts

      - name: Deploy to Test
        if: github.ref == 'refs/heads/test'
        run: dep deploy test --revision="${{ github.sha }}"

      - name: Deploy to Production
        if: github.ref == 'refs/heads/master'
        run: dep deploy prod --revision="${{ github.sha }}"
