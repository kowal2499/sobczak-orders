app_module:
  namespace: production
  description: Moduł zarządzania produkcją
  active: true
  grants:
      - name: Widoczność daty produkcji
        description: Widoczność finalnej daty produkcji całego zamówienia
        slug: production.show.production_date
        type: boolean
      - name: Widoczność działu - Klejenie
        description: Widoczność terminów i statusów działu - Klejenie
        slug: production.show.gluing
        type: boolean
      - name: Widoczność działu - CNC
        description: Widoczność terminów i statusów działu - CNC
        slug: production.show.cnc
        type: boolean
      - name: Widoczność działu - Szlifowanie
        description: Widoczność terminów i statusów działu - Szlifowanie
        slug: production.show.grinding
        type: boolean
      - name: Widoczność działu - Lakierowanie
        description: Widoczność terminów i statusów działu - Lakierowanie
        slug: production.show.laquering
        type: boolean
      - name: Widoczność działu - Pakowanie
        description: Widoczność terminów i statusów działu - Pakowanie
        slug: production.show.packing
        type: boolean

      - name: Panel produkcji
        description: Dostęp do widoku panelu produkcji
        slug: production.panel
        type: boolean

      - name: Kolumny tabeli produkcji
        description: Możliwość wyboru kolumn w tabeli produkcji
        slug: production.show.columns
        type: select
        options:
          - label: Data produkcji
            optionSlug: production_date
          - label: Klejenie - data rozpoczęcia
            optionSlug: gluing_start
          - label: Klejenie - data zakończenia
            optionSlug: gluing_end
          - label: CNC - data rozpoczęcia
            optionSlug: cnc_start
          - label: CNC - data zakończenia
            optionSlug: cnc_end
          - label: Szlifowanie - data rozpoczęcia
            optionSlug: grinding_start
          - label: Szlifowanie - data zakończenia
            optionSlug: grinding_end
          - label: Lakierowanie - data rozpoczęcia
            optionSlug: laquering_start
          - label: Lakierowanie - data zakończenia
            optionSlug: laquering_end
          - label: Pakowanie - data rozpoczęcia
            optionSlug: packing_start
          - label: Pakowanie - data zakończenia
            optionSlug: packing_end

          - label: Klejenie - status
            optionSlug: gluing_status
          - label: CNC - status
            optionSlug: cnc_status
          - label: Szlifowanie - status
            optionSlug: grinding_status
          - label: Lakierowanie - status
            optionSlug: laquering_status
          - label: Pakowanie - status
            optionSlug: packing_status
