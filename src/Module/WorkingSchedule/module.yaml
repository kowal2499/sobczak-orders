app_module:
  namespace: working-schedule
  description: Moduł harmonogramu pracy i zdolności produkcyjnych
  active: true
  grants:
    - name: Zarządzanie typami dni
      description: Możliwość definiowania czy dany dzień jest dniem roboczym, czy świętem
      slug: working-schedule.day.define
      type: boolean

    - name: Zarządzanie wartościami zdolności produkcyjnych
      description: Możliwość definiowania zdolności produkcyjnych dla poszczególnych dni
      slug: working-schedule.capacity
      type: boolean